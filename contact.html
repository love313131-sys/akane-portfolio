<head>

  <title>Contact</title>
  <link rel="stylesheet" href="css/style.css">

<body>

<section class="contact">
  <h2>CONTACT</h2>

  <form action="https://formspree.io/f/mreojlak" method="POST">

    <div class="form-group">
      <label for="name">お名前<span class="required">※</span></label>
      <input type="text" name="name" placeholder="例：山田 太郎" required>
    </div>

    <div class="form-group">
      <label for="email">メールアドレス <span class="required">※</span></label>
      <input type="email" name="email" placeholder="例：example@email.com" required>
    </div>

    <div class="form-group">
      <label for="message">お問い合わせ内容 <span class="required">※</span></label>
      <textarea id="message" name="message" rows="5" placeholder="お問い合わせ内容をご記入ください" required></textarea>
    </div>

    <button type="submit" class="btn">送信する</button>

  </form>
</section>
